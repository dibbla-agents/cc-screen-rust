# docker compose for the cc-screen-rust hub.
#
#   cd docker/hub
#   cp .env.example .env      # then edit the tokens
#   docker compose up -d --build
#
# To run a published image instead of building, comment out `build:` and keep
# `image:` pointing at your registry tag (e.g. ghcr.io/dibbla-agents/cc-screen-hub).
name: cc-screen-hub

services:
  hub:
    # Build from the repo root (the hub is a workspace member). Remove this block
    # to pull the prebuilt `image:` below instead.
    build:
      context: ../..
      dockerfile: docker/hub/Dockerfile
    image: ghcr.io/dibbla-agents/cc-screen-hub:latest
    container_name: cc-screen-hub
    restart: unless-stopped
    # Tokens / password come from .env (see .env.example).
    env_file:
      - .env
    ports:
      # hostIP:hostPort:container. Binds the host LOOPBACK by default — the hub
      # concentrates access to every connected agent's PTYs/files, so don't expose
      # it publicly without a TLS proxy + agent tokens. To reach it over a tailnet,
      # set HUB_BIND to the tailnet IP (e.g. HUB_BIND=100.x.y.z) AND configure
      # CCWEB_API_TOKEN + CCHUB_AGENT_TOKENS first — the hub's fail-closed startup
      # guard refuses a routable bind without credentials. HUB_HOST_PORT overrides
      # the host port (hubctl.sh uses 8841 so a dockerized "prod" hub coexists with
      # a native hub on 8840); the container always listens on 8840 internally.
      - "${HUB_BIND:-127.0.0.1}:${HUB_HOST_PORT:-8840}:8840"
    volumes:
      # Persists session.key, favorites, VAPID keys, and push subscriptions.
      - hub-config:/home/app/.config/cc-screen-hub

volumes:
  hub-config:
