# Build the hub container image and push it to GitHub Container Registry (GHCR).
# Fires on version tags (v*) and on manual dispatch.
#
# Auth note: this org's default Actions GITHUB_TOKEN is read-only (the same reason
# the release workflow can't create GitHub Releases itself). If the push step 403s,
# add a Classic PAT with `write:packages` as a repo/org secret named GHCR_PAT — the
# login step below prefers it when present.
name: hub-image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-push:
    # GitHub-hosted (free on a public repo): kept off the self-hosted runners so
    # the image build cache doesn't compete with the binary builds for pine's disk.
    # The cargo-dist *binary* matrix is what runs self-hosted (dist-workspace.toml).
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Owner of the GHCR namespace. Defaults to the repo owner (the org);
          # set a repo/org variable GHCR_OWNER (e.g. `erikknave`) to publish under
          # a personal account instead — pair it with a GHCR_PAT that can write it.
          images: ghcr.io/${{ vars.GHCR_OWNER || github.repository_owner }}/cc-screen-hub
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/hub/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
