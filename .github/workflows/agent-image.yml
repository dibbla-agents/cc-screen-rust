# Build the AGENT container image (the machine host that owns PTYs + runs the
# YOLO coding CLIs) and push it to GitHub Container Registry (GHCR).
#
# Auto-build on tags is TEMPORARILY DISABLED: this image is large (Ubuntu + Node +
# the coding CLIs, ~12 GB build cache) and agents usually run natively as a systemd
# service, not in a container — so rebuilding it on every release is wasteful. It's
# now **manual-only**: build on demand with `gh workflow run agent-image.yml`. To
# resume per-release auto-builds, re-add the `push: { tags: ["v*"] }` trigger below
# (mirroring hub-image.yml). The last-built `latest`/tagged image on GHCR is unaffected.
#
# Auth note: this org's default Actions GITHUB_TOKEN is read-only. If the push
# step 403s, add a Classic PAT with `write:packages` as a repo/org secret named
# GHCR_PAT — the login step below prefers it when present.
name: agent-image

on:
  workflow_dispatch:

jobs:
  build-push:
    # GitHub-hosted: the agent image is large (Ubuntu + Node + the coding CLIs)
    # and its multi-GB build cache doesn't fit safely on pine's disk alongside the
    # binary builds, so images stay on hosted runners (free on a public repo). The
    # cargo-dist *binary* matrix is what runs self-hosted (see dist-workspace.toml).
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Owner of the GHCR namespace. Defaults to the repo owner (the org);
          # set a repo/org variable GHCR_OWNER (e.g. `erikknave`) to publish under
          # a personal account instead — pair it with a GHCR_PAT that can write it.
          images: ghcr.io/${{ vars.GHCR_OWNER || github.repository_owner }}/cc-screen-agent
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/agent/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
