[workspace]
# The server (root) + the ccs TUI + the aggregator hub. Each produces its own
# `curl | sh` installer; the server and hub embed frontend/dist (built first by
# the github-build-setup step), and the hub then `cc-screen-hub install`s its
# service.
members = ["cargo:.", "cargo:crates/hub"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# Steps run in each build job BEFORE `dist build`. The server embeds the React
# PWA via rust-embed (#[folder = "frontend/dist"]), so frontend/dist must exist
# before cargo compiles it. This sets up Node and builds the frontend.
# Path is relative to .github/workflows/; the leading ../ keeps the fragment in
# .github/ so GitHub doesn't try to run it as a (malformed) standalone workflow.
github-build-setup = "../build-setup.yml"
# The installers to generate for each app (curl | sh). Produces one per app:
# cc-screen-tui-installer.sh (the ccs client) and cc-screen-rust-installer.sh
# (the server binary; run `cc-screen-rust install` after to wire the service).
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax).
# mac (both arches) + Linux as static musl so the binary runs on any distro
# regardless of glibc version. No Windows: ccs needs a real TTY and we only ship
# a POSIX shell installer.
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "aarch64-unknown-linux-musl", "x86_64-unknown-linux-musl"]
# Path that installers should place binaries in. ~/.local/bin matches the repo
# convention for ccs and works for users without a Rust toolchain (~/.cargo/bin
# may not exist); the installer adds it to PATH if missing.
install-path = "~/.local/bin"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
